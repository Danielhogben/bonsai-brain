# Bonsai Brain Swarm Configuration
# Defines agents, models, tools, and retry behavior

swarm:
  # Global settings
  name: "bonsai-brain-swarm"
  version: "0.4.0"
  
  # Default retry configuration with exponential backoff
  retry:
    enabled: true
    max_attempts: 5
    initial_delay_ms: 100
    max_delay_ms: 10000
    backoff_factor: 2.0
    jitter: true
    retry_on_timeout: true
    retry_on_network_error: true
    retry_on_5xx: true
    retry_on_429: true
    
  # Root-level git repository scope
  # Controls which directories are tracked/ignored by internal git operations
  git:
    repo_root: "."
    max_parent_traversal: 0  # Don't traverse outside repo (fixes ../../ detection)
    exclude_patterns:
      - "**/node_modules/**"
      - "**/.git/**"
      - "**/vendor/**"
      - "**/*.tmp"
      - "**/tmp/**"
    
  # Model providers and configurations
  models:
    default_provider: "openrouter"
    providers:
      openrouter:
        enabled: true
        api_key_env: "OPENROUTER_API_KEY"
        base_url: "https://openrouter.ai/api/v1"
        models:
          - name: "meta-llama/llama-3.3-70b-instruct:free"
            default: true
            max_tokens: 8192
            temperature: 0.7
          - name: "openai/gpt-4o-mini"
            max_tokens: 16384
            temperature: 0.5
          - name: "google/gemma-3-4b-it:free"
            max_tokens: 4096
            temperature: 0.7
          - name: "nvidia/nemotron-3-super-120b:free"
            max_tokens: 4096
            temperature: 0.5
      groq:
        enabled: true
        api_key_env: "GROQ_API_KEY"
        base_url: "https://api.groq.com/openai/v1"
        models:
          - name: "llama-3.3-70b-versatile"
            max_tokens: 8192
            temperature: 0.7
          - name: "llama-3.2-3b-preview"
            max_tokens: 4096
            temperature: 0.5
      kimi:
        enabled: true
        api_key_env: "KIMI_API_KEY"
        base_url: "https://api.moonshot.cn/v1"
        models:
          - name: "moonshot-v1-8k"
            max_tokens: 8192
            temperature: 0.3
      ollama:
        enabled: true
        base_url: "http://localhost:11434"
        models:
          - name: "llama3.2"
            default: true
            temperature: 0.7

  # Agents definitions
  agents:
    - name: "primary"
      role: "general-assistant"
      model: "meta-llama/llama-3.3-70b-instruct:free"
      provider: "openrouter"
      max_iterations: 10
      tools:
        - "web_search"
        - "read_file"
        - "write_file"
        - "fetch_url"
        - "grep_files"
      memory:
        enabled: true
        max_turns: 50
        vector_store: "chroma"
      
    - name: "code"
      role: "coding-assistant"
      model: "openai/gpt-4o-mini"
      provider: "openrouter"
      max_iterations: 15
      tools:
        - "web_search"
        - "read_file"
        - "write_file"
        - "grep_files"
      memory:
        enabled: true
        max_turns: 100
        vector_store: "chroma"
        
    - name: "fast"
      role: "quick-response"
      model: "llama-3.2-3b-preview"
      provider: "groq"
      max_iterations: 5
      tools:
        - "web_search"
        - "read_file"
      memory:
        enabled: false

  # Tools configuration
  tools:
    web_search:
      enabled: true
      provider: "tavily"
      api_key_env: "TAVILY_API_KEY"
      max_results: 10
      
    file_operations:
      enabled: true
      allowed_paths:
        - "./"
        - "../"
      max_file_size_mb: 100
      
    browser:
      enabled: false  # Disabled by default for security
      provider: "browserbase"
      api_key_env: "BROWSERBASE_API_KEY"

  # Memory/Vector store configuration
  memory:
    provider: "chroma"
    chroma:
      host: "localhost"
      port: 8000
      collection: "bonsai-brain"
    
  # Logging
  logging:
    level: "info"
    format: "json"
    output: "stdout"
    file: ""
    
  # Security
  security:
    max_message_length: 16000
    blocked_patterns: []
    content_filter: true